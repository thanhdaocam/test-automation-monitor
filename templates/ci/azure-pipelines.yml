trigger:
  branches:
    include:
      - main
      - develop
  paths:
    exclude:
      - '*.md'
      - 'docs/**'

pr:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  NODE_VERSION: '20'
  npm_config_cache: $(Pipeline.Workspace)/.npm

stages:
  - stage: Test
    displayName: 'Run Tests'
    jobs:
      - job: UnitTests
        displayName: 'Unit Tests'
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: $(NODE_VERSION)

          - task: Cache@2
            inputs:
              key: 'npm | "$(Agent.OS)" | package-lock.json'
              path: $(npm_config_cache)
            displayName: 'Cache npm'

          - script: npm ci
            displayName: 'Install dependencies'

          - script: npx vitest run --coverage --reporter=json --outputFile=test-results/unit-results.json
            displayName: 'Run unit tests'

          - task: PublishTestResults@2
            condition: always()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: 'test-results/junit.xml'
              mergeTestResults: true

          - task: PublishPipelineArtifact@1
            condition: always()
            inputs:
              targetPath: 'test-results'
              artifact: 'unit-test-results'

      - job: E2ETests
        displayName: 'E2E Tests'
        dependsOn: UnitTests
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: $(NODE_VERSION)

          - script: npm ci
            displayName: 'Install dependencies'

          - script: npx playwright install --with-deps chromium
            displayName: 'Install Playwright browsers'

          - script: npx playwright test --reporter=json,html,junit
            displayName: 'Run E2E tests'

          - task: PublishTestResults@2
            condition: always()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: 'test-results/results.xml'

          - task: PublishPipelineArtifact@1
            condition: always()
            inputs:
              targetPath: 'playwright-report'
              artifact: 'playwright-report'

      - job: APITests
        displayName: 'API Tests'
        dependsOn: UnitTests
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: $(NODE_VERSION)

          - script: npm ci
            displayName: 'Install dependencies'

          - script: npx playwright test --grep @api --reporter=json
            displayName: 'Run API tests'
            env:
              BASE_URL: $(API_BASE_URL)

          - task: PublishPipelineArtifact@1
            condition: always()
            inputs:
              targetPath: 'test-results'
              artifact: 'api-test-results'
