# Docker Compose for Test Environment
# Run with: /docker-test up
# Stop with: /docker-test down
#
# SECURITY: All credentials use environment variables with safe defaults.
# For production-like testing, create a .env file (see .env.example).
# NEVER commit real credentials to version control.

services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-testdb}
      POSTGRES_USER: ${POSTGRES_USER:-testuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-testpass}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-testuser} -d ${POSTGRES_DB:-testdb}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis cache
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MongoDB (alternative NoSQL)
  # mongo:
  #   image: mongo:7
  #   environment:
  #     MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-testuser}
  #     MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-testpass}
  #   ports:
  #     - "${MONGO_PORT:-27017}:27017"
  #   healthcheck:
  #     test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 5

  # Application under test
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: test
      DATABASE_URL: postgresql://${POSTGRES_USER:-testuser}:${POSTGRES_PASSWORD:-testpass}@postgres:5432/${POSTGRES_DB:-testdb}
      REDIS_URL: redis://redis:${REDIS_PORT:-6379}
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Test runner
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile
    command: npx vitest run --reporter=json --outputFile=/results/test-results.json
    environment:
      NODE_ENV: test
      DATABASE_URL: postgresql://${POSTGRES_USER:-testuser}:${POSTGRES_PASSWORD:-testpass}@postgres:5432/${POSTGRES_DB:-testdb}
      REDIS_URL: redis://redis:${REDIS_PORT:-6379}
      BASE_URL: http://app:${APP_PORT:-3000}
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - ./test-results:/results

volumes:
  postgres_data:
